<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>교내 하이브리드 AR 토론 광장</title>
    <!-- 가장 안정적인 버전의 A-Frame 및 AR.js 라이브러리 사용 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    
    <style>
      /* 카메라 화면이 일부 기기에서 뒤집혀 보이는 현상 방지 */
      video {
        transform: scaleX(1) !important;
      }
    </style>

    <script>
      AFRAME.registerComponent('vote-handler', {
        init: function () {
          var el = this.el;
          
          el.addEventListener('click', function () {
            var id = el.getAttribute('id'); // 예: pro-1, con-3 등
            var isPro = id.includes('pro');
            
            // 현재 클릭된 마커 안의 피드백 창 찾기
            var marker = el.closest('a-marker');
            var feedbackPlane = marker.querySelector('.feedback-bg');
            var feedbackText = marker.querySelector('.feedback-text');
            
            if (isPro) {
              feedbackPlane.setAttribute('material', 'color', '#3A5A40');
              feedbackText.setAttribute('value', 'VOTE SUCCESS!\n[PRO] Agree');
            } else {
              feedbackPlane.setAttribute('material', 'color', '#A34A3E');
              feedbackText.setAttribute('value', 'VOTE SUCCESS!\n[CON] Disagree');
            }
            
            feedbackPlane.setAttribute('visible', 'true');
            feedbackText.setAttribute('visible', 'true');
            
            setTimeout(function() {
              feedbackPlane.setAttribute('visible', 'false');
              feedbackText.setAttribute('visible', 'false');
            }, 2000);
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <!-- 바코드(Matrix) 인식 설정 -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- 깃허브 저장소에 올린 .png 이미지 경로 매칭 -->
      <a-assets>
        <img id="img-climate" src="1.png">
        <img id="img-admission" src="3.png">
        <img id="img-gene" src="2.png">
      </a-assets>

      <!-- ==================== 포스터 1: 기후 정의 (바코드 1번 마커) ==================== -->
      <a-marker type="barcode" value="1">
        <!-- rotation="-90 0 0"으로 마커 표면에 납작하게 눕히고, y=0.01로 겹침 현상 방지 -->
        <a-image src="#img-climate" position="0 0.01 0" rotation="-90 0 0" width="1.78" height="1"></a-image>
        
        <!-- 투표 클릭 영역도 똑같이 눕히고, 이미지보다 살짝 위(y=0.02)에 배치 -->
        <a-plane id="pro-1" class="clickable" vote-handler position="-0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        <a-plane id="con-1" class="clickable" vote-handler position="0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        
        <!-- 투표 성공 피드백 창: 포스터 위쪽(z=-0.7)에 나란히 눕혀서 배치 -->
        <a-plane class="feedback-bg" position="0 0.02 -0.7" rotation="-90 0 0" width="1.5" height="0.25" material="color: #2B2621; opacity: 0.9" visible="false">
          <a-text class="feedback-text" value="" align="center" color="#FFFFFF" width="2.2" position="0 0 0.01" visible="false"></a-text>
        </a-plane>
      </a-marker>

      <!-- ==================== 포스터 2: 대학 입시 (바코드 2번 마커) ==================== -->
      <a-marker type="barcode" value="2">
        <a-image src="#img-admission" position="0 0.01 0" rotation="-90 0 0" width="1.78" height="1"></a-image>
        <a-plane id="pro-2" class="clickable" vote-handler position="-0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        <a-plane id="con-2" class="clickable" vote-handler position="0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        
        <a-plane class="feedback-bg" position="0 0.02 -0.7" rotation="-90 0 0" width="1.5" height="0.25" material="color: #2B2621; opacity: 0.9" visible="false">
          <a-text class="feedback-text" value="" align="center" color="#FFFFFF" width="2.2" position="0 0 0.01" visible="false"></a-text>
        </a-plane>
      </a-marker>

      <!-- ==================== 포스터 3: 유전자 편집 (바코드 3번 마커) ==================== -->
      <a-marker type="barcode" value="3">
        <a-image src="#img-gene" position="0 0.01 0" rotation="-90 0 0" width="1.78" height="1"></a-image>
        <a-plane id="pro-3" class="clickable" vote-handler position="-0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        <a-plane id="con-3" class="clickable" vote-handler position="0.44 0.02 0" rotation="-90 0 0" width="0.75" height="0.8" material="opacity: 0; transparent: true"></a-plane>
        
        <a-plane class="feedback-bg" position="0 0.02 -0.7" rotation="-90 0 0" width="1.5" height="0.25" material="color: #2B2621; opacity: 0.9" visible="false">
          <a-text class="feedback-text" value="" align="center" color="#FFFFFF" width="2.2" position="0 0 0.01" visible="false"></a-text>
        </a-plane>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
